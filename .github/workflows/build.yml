name: Auto Update MMDB Database

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Download IPinfo CSV
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          curl -fsSL -o ipinfo_lite.csv.gz "https://ipinfo.io/data/ipinfo_lite.csv.gz?token=${IPINFO_TOKEN}"
          gunzip ipinfo_lite.csv.gz

      - name: Init and Run Go Script
        run: |
          # 如果你的仓库还没有 go.mod，它会自动初始化
          if [ ! -f "go.mod" ]; then
            go mod init mmdb-builder
          fi
          go mod tidy
          go run main.go

      - name: Get Current Date for Release
        run: |
          echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "SHORT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "IP Database Update (${{ env.SHORT_DATE }})"
          body: |
            自动拉取最新 CSV 数据并构建的 MMDB 文件。
            
            **构建时间**: ${{ env.BUILD_TIME }}
          files: Country.mmdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
