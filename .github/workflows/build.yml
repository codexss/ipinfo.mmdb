name: Update MMDB Database

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Download IPinfo CSV
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          curl -fsSL "https://ipinfo.io/data/ipinfo_lite.csv.gz?token=${IPINFO_TOKEN}" | zcat > ipinfo_lite.csv

      - name: Init and Run Go Script
        run: |
          go mod init mmdb-builder
          go mod tidy
          go run main.go
          mkdir -p dist
          mv Country.mmdb dist/

      - name: Get Current Date for Release
        run: |
          echo "SHORT_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
